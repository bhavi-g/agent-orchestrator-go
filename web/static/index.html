<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Orchestrator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <aside id="sidebar">
        <div class="sidebar-brand">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            Agent Orchestrator
        </div>
        <button class="new-btn" id="btn-new">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Analysis
        </button>
        <div class="sidebar-history" id="sidebar-history"></div>
        <div class="sidebar-footer">
            <span class="health-dot" id="health-dot"></span>
            <span class="health-text" id="health-text">Checking…</span>
        </div>
    </aside>

    <div id="layout">
        <div id="scroll-area"><div id="app"></div></div>
        <div class="input-section">
            <div class="input-wrap">
                <div class="input-box" id="input-box">
                    <input id="inp-path" class="inp-path"
                        placeholder="Paste absolute path to log directory…"
                        autocomplete="off" spellcheck="false" />
                    <div class="input-footer">
                        <input id="inp-task" class="inp-task"
                            placeholder="Label (optional)" autocomplete="off" />
                        <label class="upload-btn" id="btn-upload" title="Upload log files">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <input type="file" id="file-input" multiple accept=".log,.txt,.out,.err,.json,.csv" hidden />
                        </label>
                        <button class="demo-btn" id="btn-demo" title="Try with sample logs">Try Demo</button>
                        <button class="send-btn" id="btn-send" disabled title="Analyze">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                        </button>
                    </div>
                </div>
                <p class="disclaimer">Runs entirely on your machine — no data sent to any server.</p>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
